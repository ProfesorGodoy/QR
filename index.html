<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Sistema QR Bar</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family: Arial;
text-align:center;
margin:30px;
background:#f4f4f4;
}

h1{
color:#333;
}

button{
padding:12px;
margin:5px;
font-size:16px;
cursor:pointer;
border:none;
background:#2c7be5;
color:white;
border-radius:6px;
}

button:hover{
background:#1a5dc9;
}

#qrcode{
margin:20px;
}

table{
margin:auto;
border-collapse:collapse;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

td,th{
border:1px solid #ddd;
padding:10px;
}

th{
background:#eee;
}

</style>

</head>

<body>

<div id="app"></div>

<script>

let contador = localStorage.getItem("contador") 
? parseInt(localStorage.getItem("contador")) 
: 1

let pedidos = localStorage.getItem("pedidos") 
? JSON.parse(localStorage.getItem("pedidos")) 
: []

function guardarDatos(){

localStorage.setItem("contador", contador)
localStorage.setItem("pedidos", JSON.stringify(pedidos))

}

function nuevoPedido(){

let pedido = contador++

pedidos.push({
numero:pedido,
estado:"Preparando"
})

guardarDatos()

let url = window.location.href.split("?")[0] + "?pedido=" + pedido

document.getElementById("numeroPedido").innerHTML =
"Pedido #" + pedido

document.getElementById("qrcode").innerHTML = ""

new QRCode(
document.getElementById("qrcode"),
url
)

actualizarTabla()

}

function actualizarTabla(){

let tabla = document.getElementById("tablaPedidos")

tabla.innerHTML = ""

pedidos.forEach(p => {

tabla.innerHTML += `
<tr>
<td>${p.numero}</td>
<td>${p.estado}</td>
<td>
<button onclick="marcarListo(${p.numero})">
Pedido listo
</button>
</td>
</tr>
`

})

}

function marcarListo(numero){

pedidos.forEach(p => {

if(p.numero === numero){

p.estado = "Listo"

}

})

guardarDatos()

actualizarTabla()

}

function cargarModoBar(){

document.getElementById("app").innerHTML = `

<h1>🍔 Sistema de Pedidos del Bar</h1>

<h2 id="numeroPedido"></h2>

<button onclick="nuevoPedido()">Crear nuevo pedido</button>

<div id="qrcode"></div>

<hr>

<h2>Panel del Bar</h2>

<table>

<tr>
<th>Pedido</th>
<th>Estado</th>
<th>Acción</th>
</tr>

<tbody id="tablaPedidos"></tbody>

</table>

`

actualizarTabla()

}

function cargarModoCliente(numero){

document.getElementById("app").innerHTML = `

<h1>🍔 Pedido #${numero}</h1>

<h2 id="estadoPedido">Preparando...</h2>

<br>

<button onclick="activarNotificaciones()">
Activar notificaciones 🔔
</button>

`

let numeroPedido = numero

function revisarEstado(){

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || []

let pedido = pedidos.find(p => p.numero == numeroPedido)

if(pedido){

document.getElementById("estadoPedido").innerHTML =
"Estado: " + pedido.estado

if(pedido.estado === "Listo"){

if(Notification.permission === "granted"){

new Notification("🍔 Pedido listo",{
body:"Tu pedido ya está listo para retirar"
})

}

}

}

}

setInterval(revisarEstado,2000)

}

function activarNotificaciones(){

Notification.requestPermission().then(permission => {

if(permission === "granted"){

alert("Te avisaremos cuando esté listo 🍔")

}

})

}

const params = new URLSearchParams(window.location.search)

const pedidoCliente = params.get("pedido")

if(pedidoCliente){

cargarModoCliente(pedidoCliente)

}else{

cargarModoBar()

}

</script>

</body>

</html>
