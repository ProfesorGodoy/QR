<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema QR Bar</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
margin:0;
background:#f4f4f4;
}

h1{
font-size:40px;
}

.estado{
font-size:60px;
font-weight:bold;
margin-top:20px;
}

button{
padding:18px;
margin:10px;
font-size:22px;
background:#2c7be5;
color:white;
border:none;
border-radius:10px;
}

.alerta{
animation:flash 0.6s infinite;
}

@keyframes flash{

0%{background:red;color:white;}
50%{background:white;color:red;}
100%{background:red;color:white;}

}

table{
width:95%;
margin:auto;
border-collapse:collapse;
font-size:22px;
background:white;
}

td,th{
border:1px solid #ccc;
padding:12px;
}

</style>

</head>

<body>

<div id="app"></div>

<script>

/* SONIDO */

let sonidoActivado=false

const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")

function activarSonido(){

beep.play()
sonidoActivado=true
alert("Sonido activado")

}

function sonarAlarma(){

setInterval(()=>{

beep.currentTime=0
beep.play()

},1000)

}

/* FIREBASE */

const firebaseConfig = {

apiKey: "TU_API_KEY",
authDomain: "sistema-bar-782a3.firebaseapp.com",
databaseURL: "https://sistema-bar-782a3-default-rtdb.firebaseio.com",
projectId: "sistema-bar-782a3",
storageBucket: "sistema-bar-782a3.appspot.com",
messagingSenderId: "806007161788",
appId: "1:806007161788:web:d4e19142ac9fda3fb121b9"

}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

/* NUMERO UNICO */

function generarNumero(){

return Date.now()

}

/* CREAR PEDIDO */

function nuevoPedido(){

let numero=generarNumero()

db.ref("pedidos/"+numero).set({
estado:"Preparando",
timestamp:numero
})

let url=window.location.href.split("?")[0]+"?pedido="+numero

document.getElementById("num").innerHTML="Pedido #"+numero

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"),url)

}

/* PANEL BAR */

function modoBar(){

document.getElementById("app").innerHTML=`

<h1>Panel del Bar</h1>

<h2 id="num"></h2>

<button onclick="nuevoPedido()">Nuevo pedido</button>

<div id="qrcode"></div>

<hr>

<table>

<tr>
<th>Pedido</th>
<th>Estado</th>
<th></th>
</tr>

<tbody id="tabla"></tbody>

</table>

`

db.ref("pedidos").on("value",snap=>{

let datos=snap.val()

if(!datos){
document.getElementById("tabla").innerHTML=""
return
}

let pedidos=Object.entries(datos)

/* ordenar por nuevos */

pedidos.sort((a,b)=>b[1].timestamp-a[1].timestamp)

/* maximo 10 */

pedidos=pedidos.slice(0,10)

let html=""

pedidos.forEach(p=>{

let numero=p[0]
let estado=p[1].estado

html+=`

<tr>
<td>#${numero}</td>
<td>${estado}</td>
<td>
<button onclick="listo('${numero}')">Listo</button>
</td>
</tr>

`

})

document.getElementById("tabla").innerHTML=html

})

}

/* LISTO */

function listo(n){

db.ref("pedidos/"+n).update({
estado:"Listo"
})

setTimeout(()=>{

db.ref("pedidos/"+n).remove()

},2000)

}

/* CLIENTE */

function modoCliente(n){

document.getElementById("app").innerHTML=`

<h1>Pedido</h1>

<div id="estado" class="estado">Esperando pedido...</div>

<br>

<button onclick="activarSonido()">Activar sonido</button>

`

let avisado=false

db.ref("pedidos/"+n).on("value",snap=>{

let datos=snap.val()

if(!datos){
return
}

let estado=datos.estado

document.getElementById("estado").innerHTML=estado

if(estado==="Listo" && !avisado){

avisado=true

document.body.classList.add("alerta")

if(sonidoActivado){
sonarAlarma()
}

}

})

}

/* DETECTAR MODO */

const params=new URLSearchParams(window.location.search)

const pedido=params.get("pedido")

if(pedido){

modoCliente(pedido)

}else{

modoBar()

}

</script>

</body>

</html>
