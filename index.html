<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Sistema QR Bar</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
margin:30px;
}

button{
padding:12px;
margin:5px;
font-size:16px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1a5dc9;
}

table{
margin:auto;
background:white;
border-collapse:collapse;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

td,th{
border:1px solid #ddd;
padding:10px;
}

th{
background:#eee;
}

#qrcode{
margin:20px;
}

</style>

</head>

<body>

<div id="app"></div>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyCCT3w5_33bR-RZ5TTAY_tGk9Ur5UE5mLM",
  authDomain: "sistema-bar-782a3.firebaseapp.com",
  databaseURL: "https://sistema-bar-782a3-default-rtdb.firebaseio.com",
  projectId: "sistema-bar-782a3",
  storageBucket: "sistema-bar-782a3.firebasestorage.app",
  messagingSenderId: "806007161788",
  appId: "1:806007161788:web:d4e19142ac9fda3fb121b9"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let contador = 1;

/* CREAR PEDIDO */

function nuevoPedido(){

let numero = contador++;

db.ref("pedidos/"+numero).set({
estado:"Preparando"
});

let url = window.location.href.split("?")[0] + "?pedido=" + numero;

document.getElementById("numeroPedido").innerHTML="Pedido #"+numero;

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),url);

}

/* PANEL BAR */

function cargarBar(){

document.getElementById("app").innerHTML=`

<h1>🍔 Sistema de Pedidos del Bar</h1>

<h2 id="numeroPedido"></h2>

<button onclick="nuevoPedido()">Crear nuevo pedido</button>

<div id="qrcode"></div>

<hr>

<h2>Panel del Bar</h2>

<table>

<tr>
<th>Pedido</th>
<th>Estado</th>
<th>Acción</th>
</tr>

<tbody id="tablaPedidos"></tbody>

</table>

`;

db.ref("pedidos").on("value",snapshot=>{

let datos=snapshot.val();

let html="";

for(let p in datos){

html+=`

<tr>
<td>${p}</td>
<td>${datos[p].estado}</td>
<td>
<button onclick="marcarListo(${p})">Pedido listo</button>
</td>
</tr>

`;

}

document.getElementById("tablaPedidos").innerHTML=html;

});

}

/* MARCAR LISTO */

function marcarListo(numero){

db.ref("pedidos/"+numero).update({
estado:"Listo"
});

}

/* CLIENTE */

function cargarCliente(numero){

document.getElementById("app").innerHTML=`

<h1>🍔 Pedido #${numero}</h1>

<h2 id="estadoPedido">Esperando estado...</h2>

`;

db.ref("pedidos/"+numero).on("value",snapshot=>{

let estado=snapshot.val().estado;

document.getElementById("estadoPedido").innerHTML="Estado: "+estado;

if(estado==="Listo"){

if(Notification.permission==="granted"){

new Notification("🍔 Pedido listo",{
body:"Tu pedido ya está listo para retirar"
});

}

}

});

Notification.requestPermission();

}

/* DETECTAR MODO */

const params=new URLSearchParams(window.location.search);

const pedido=params.get("pedido");

if(pedido){

cargarCliente(pedido);

}else{

cargarBar();

}

</script>

</body>

</html>
