<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema QR Bar</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
margin:10px;
}

h1{
font-size:40px;
}

h2{
font-size:32px;
}

button{
padding:15px;
margin:10px;
font-size:20px;
background:#2c7be5;
color:white;
border:none;
border-radius:10px;
width:250px;
}

button:hover{
background:#1a5dc9;
}

table{
width:95%;
margin:auto;
background:white;
border-collapse:collapse;
box-shadow:0 0 10px rgba(0,0,0,0.2);
font-size:22px;
}

td,th{
border:1px solid #ddd;
padding:15px;
}

th{
background:#eee;
}

#qrcode{
margin:20px;
display:flex;
justify-content:center;
}

.estadoGrande{
font-size:50px;
color:#d9534f;
}

@media (max-width:600px){

h1{
font-size:32px;
}

h2{
font-size:26px;
}

.estadoGrande{
font-size:40px;
}

}

</style>

</head>

<body>

<div id="app"></div>

<script>

/* SONIDO */

const sonido = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

/* FIREBASE */

const firebaseConfig = {
  apiKey: "AIzaSyCCT3w5_33bR-RZ5TTAY_tGk9Ur5UE5mLM",
  authDomain: "sistema-bar-782a3.firebaseapp.com",
  databaseURL: "https://sistema-bar-782a3-default-rtdb.firebaseio.com",
  projectId: "sistema-bar-782a3",
  storageBucket: "sistema-bar-782a3.firebasestorage.app",
  messagingSenderId: "806007161788",
  appId: "1:806007161788:web:d4e19142ac9fda3fb121b9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let contador = 1;

/* CREAR PEDIDO */

function nuevoPedido(){

let numero = contador++;

db.ref("pedidos/"+numero).set({
estado:"Preparando"
});

let url = window.location.href.split("?")[0] + "?pedido=" + numero;

document.getElementById("numeroPedido").innerHTML="Pedido #"+numero;

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),url);

}

/* PANEL BAR */

function cargarBar(){

document.getElementById("app").innerHTML=`

<h1>🍔 Sistema de Pedidos</h1>

<h2 id="numeroPedido"></h2>

<button onclick="nuevoPedido()">Nuevo Pedido</button>

<div id="qrcode"></div>

<hr>

<h2>Panel del Bar</h2>

<table>

<tr>
<th>Pedido</th>
<th>Estado</th>
<th>Acción</th>
</tr>

<tbody id="tablaPedidos"></tbody>

</table>

`;

db.ref("pedidos").on("value",snapshot=>{

let datos=snapshot.val();
let html="";

for(let p in datos){

html+=`

<tr>
<td>#${p}</td>
<td>${datos[p].estado}</td>
<td>
<button onclick="marcarListo(${p})">Listo</button>
</td>
</tr>

`;

}

document.getElementById("tablaPedidos").innerHTML=html;

});

}

/* MARCAR LISTO */

function marcarListo(numero){

db.ref("pedidos/"+numero).update({
estado:"Listo"
});

}

/* CLIENTE */

function cargarCliente(numero){

document.getElementById("app").innerHTML=`

<h1>🍔 Pedido #${numero}</h1>

<h2 id="estadoPedido" class="estadoGrande">Preparando...</h2>

`;

let yaAvisado=false;

db.ref("pedidos/"+numero).on("value",snapshot=>{

let estado=snapshot.val().estado;

document.getElementById("estadoPedido").innerHTML=estado;

if(estado==="Listo" && !yaAvisado){

yaAvisado=true;

sonido.play();

if(Notification.permission==="granted"){

new Notification("🍔 Pedido listo",{
body:"Tu pedido está listo para retirar"
});

}

}

});

Notification.requestPermission();

}

/* DETECTAR MODO */

const params=new URLSearchParams(window.location.search);
const pedido=params.get("pedido");

if(pedido){

cargarCliente(pedido);

}else{

cargarBar();

}

</script>

</body>

</html>
